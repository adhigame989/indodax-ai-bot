<script>

const logBox = document.getElementById("log");

function log(msg){
  logBox.innerHTML += msg + "<br>";
}

async function getTickers(){

  try{

    const response = await fetch(
      "https://indodax.com/api/tickers"
    );

    if(!response.ok){
      throw new Error("API ERROR");
    }

    const data = await response.json();

    if(!data.tickers){
      throw new Error("Ticker tidak ada");
    }

    return data;

  }catch(err){

    log("ERROR FETCH:");
    log(err.message);

    return null;
  }
}

function analyzeCoins(data){

  const results = [];

  const tickers = data.tickers;

  Object.keys(tickers).forEach(pair=>{

    if(!pair.endsWith("_idr")) return;

    const c = tickers[pair];

    const buy = Number(c.buy);
    const sell = Number(c.sell);
    const last = Number(c.last);
    const vol = Number(c.vol_idr);

    if(
      isNaN(buy) ||
      isNaN(sell) ||
      isNaN(last) ||
      isNaN(vol)
    ){
      return;
    }

    if(vol < 100000000){
      return;
    }

    const spread = Math.abs(sell - buy);

    const momentum =
      ((last - buy) / buy) * 100;

    const score =
      (vol / 1000000) +
      (momentum * 100) -
      spread;

    results.push({
      pair,
      buy,
      sell,
      last,
      vol,
      spread,
      momentum,
      score
    });

  });

  results.sort((a,b)=>b.score-a.score);

  return results.slice(0,5);
}

async function startBot(){

  log("");
  log("SCAN MARKET...");

  const data = await getTickers();

  if(!data){
    log("GAGAL SCAN MARKET");
    return;
  }

  const coins = analyzeCoins(data);

  if(coins.length === 0){

    log("TIDAK ADA COIN VALID");
    return;
  }

  log("");
  log("TOP COIN:");

  coins.forEach((c,i)=>{

    log(
      (i+1) +
      ". " +
      c.pair +
      " | PRICE: " +
      c.last +
      " | VOL: " +
      Math.floor(c.vol)
    );

  });

  const best = coins[0];

  log("");
  log("AI PILIH:");
  log(best.pair);

  autoMonitor(best);
}

function autoMonitor(coin){

  log("");
  log("MONITORING " + coin.pair);

  const tp =
    coin.last * 1.03;

  const sl =
    coin.last * 0.97;

  log("TP: " + Math.floor(tp));
  log("SL: " + Math.floor(sl));

  setInterval(async()=>{

    const data = await getTickers();

    if(!data) return;

    const c =
      data.tickers[coin.pair];

    if(!c) return;

    const price =
      Number(c.last);

    log(
      coin.pair +
      " => " +
      price
    );

    if(price >= tp){

      log("TAKE PROFIT HIT");
    }

    if(price <= sl){

      log("STOP LOSS HIT");
    }

  },10000);

}

</script>
